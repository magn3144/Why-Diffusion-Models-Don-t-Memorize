name: memorization
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10
  
  # Core scientific computing
  - numpy
  - scipy
  
  # Plotting and visualization
  - matplotlib
  
  # Image processing
  - pillow
  
  # Progress bars
  - tqdm
  
  # Natural sorting
  - natsort
  
  # Pip (for any additional packages)
  - pip

  # PyTorch and related (from pytorch channel)
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch-cuda=12.1  # Common supported option; use 11.8 or 12.4 if needed